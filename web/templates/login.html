<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CPBL Bot 後台登入</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surface:#151821;--card:#1c2030;--border:#252a3a;--accent:#e84545;--text:#e2e8f0;--muted:#64748b}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;}

.bg-lines{
  position:fixed;inset:0;pointer-events:none;
  background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.018) 39px, rgba(255,255,255,.018) 40px),
              repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.018) 39px, rgba(255,255,255,.018) 40px);
}
.login-wrap{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:40px 36px;width:360px;position:relative;z-index:1;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}
.login-wrap::before{
  content:'';position:absolute;top:0;left:36px;right:36px;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:1px;
}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--accent);letter-spacing:2px}
.login-logo p{font-size:12px;color:var(--muted);margin-top:2px}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.form-input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;
  padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s;
  font-family:'Noto Sans TC',sans-serif;
}
.form-input:focus{border-color:var(--accent)}
.btn-login{
  width:100%;padding:11px;background:var(--accent);color:#fff;border:none;
  border-radius:7px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;margin-top:4px;letter-spacing:.5px;
  transition:opacity .15s;
}
.btn-login:hover{opacity:.88}
.alert{padding:9px 12px;border-radius:6px;font-size:13px;margin-bottom:14px;
  background:rgba(232,69,69,.12);border-left:3px solid var(--accent);color:#fca5a5}
</style>
</head>
<body>
<div class="bg-lines"></div>
<div class="login-wrap">
  <div class="login-logo">
    <h1>CPBL</h1>
    <p>Bot 管理後台</p>
  </div>
  {% with msgs=get_flashed_messages() %}
    {% for m in msgs %}<div class="alert">{{ m }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label class="form-label">帳號</label>
      <input name="username" class="form-input" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label class="form-label">密碼</label>
      <input name="password" type="password" class="form-input" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">登入後台</button>
  </form>
</div>
</body>
</html>
